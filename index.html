}

function rankData(data, gapFn) {
  return [...data].sort((a,b) => gapFn(a) - gapFn(b)).map((d,i) => ({...d, rank: i+1}));
}

function simpleAvg(data, gapFn) {
  return data.reduce((s,d) => s + gapFn(d), 0) / data.length;
}
function weightedAvg(data, gapFn, staffKey) {
  const tot = data.reduce((s,d) => s + d[staffKey], 0);
  return data.reduce((s,d) => s + gapFn(d) * d[staffKey], 0) / tot;
}

function gapClass(v) {
  if (metric === 'q41') { return v <= 10 ? 'gap-low' : v <= 20 ? 'gap-mid' : 'gap-high'; }
  return v <= 7 ? 'gap-low' : v <= 12 ? 'gap-mid' : 'gap-high';
}

const fmt = v => v.toFixed(1);

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function render() {
  const isQ41 = metric === 'q41';
  const unit  = '%';
  const shortLabel = metric === 'avg' ? 'Avg Gap' : metric === 'med' ? 'Median Gap' : 'Q4–Q1 Diff';

  // Rankings
  const ranked24 = rankData(RAW, getGap24);
  const ranked23 = rankData(RAW, getGap23);
  const rank23Map = {};
  ranked23.forEach(d => rank23Map[d.name] = d.rank);

  let rows = ranked24.map(d => {
    const prevRank = rank23Map[d.name] ?? null;
    const change   = prevRank !== null ? prevRank - d.rank : null;
    return {...d, prevRank, change};
  });

  if (sortKey === 'rank-asc')     rows.sort((a,b) => a.rank - b.rank);
  if (sortKey === 'rank-desc')    rows.sort((a,b) => b.rank - a.rank);
  if (sortKey === 'name-asc')     rows.sort((a,b) => a.name.localeCompare(b.name));
  if (sortKey === 'change-best')  rows.sort((a,b) => (b.change ?? -999) - (a.change ?? -999));
  if (sortKey === 'change-worst') rows.sort((a,b) => (a.change ?? 999)  - (b.change ?? 999));

  // ── Stats ──
  const uw24 = simpleAvg(RAW, getGap24);
  const uw23 = simpleAvg(RAW, getGap23);
  const wt24 = weightedAvg(RAW, getGap24, 'staff24');
  const wt23 = weightedAvg(RAW, getGap23, 'staff23');
  const improved = rows.filter(r => r.change > 0).length;

  function deltaHTML(delta) {
    if (Math.abs(delta) < 0.005) return `<span style="color:var(--muted)">no change</span>`;
    const better = delta < 0; // lower gap = better
    const sign   = better ? '▼' : '▲';
    const cls    = better ? 'chg-good' : 'chg-bad';
    return `<span class="${cls}">${sign} ${Math.abs(delta).toFixed(2)}${unit}</span>`;
  }

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Sector Average (2024–25)</div>
      <div class="stat-value">${fmt(uw24)}<span class="unit">${unit}</span></div>
      <div class="stat-sub">vs ${fmt(uw23)}${unit} in 2023–24 &nbsp;·&nbsp; ${deltaHTML(uw24 - uw23)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Weighted Sector Average (2024–25)</div>
      <div class="stat-value">${fmt(wt24)}<span class="unit">${unit}</span></div>
      <div class="stat-sub">vs ${fmt(wt23)}${unit} in 2023–24 &nbsp;·&nbsp; ${deltaHTML(wt24 - wt23)}<br><span style="font-style:italic">Weighted by number of staff</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Universities Improved</div>
      <div class="stat-value" style="color:var(--green)">${improved}<span class="unit"> / 39</span></div>
      <div class="stat-sub">reduced their gap vs 2023–24</div>
    </div>
  `;

  // ── Column headers ──
  document.getElementById('th-gap-label').textContent  = shortLabel;
  document.getElementById('th-prev-label').textContent = shortLabel;

  // ── Table rows ──
  document.getElementById('table-body').innerHTML = rows.map(row => {
    const gap24 = getGap24(row);
    const gap23 = getGap23(row);
    let changeTxt = '—', changeCls = 'change-same';
    if (row.change !== null && row.change !== 0) {
      changeTxt = row.change > 0 ? `▲&nbsp;${row.change}` : `▼&nbsp;${Math.abs(row.change)}`;
      changeCls = row.change > 0 ? 'change-up' : 'change-down';
    }
    return `<tr>
      <td class="td-rank ${row.rank<=3?'top3':''}">${row.rank}</td>
      <td class="td-name">${row.name}</td>
      <td class="td-gap"><span class="${gapClass(gap24)}">${fmt(gap24)}</span><span class="unit">${unit}</span></td>
      <td class="td-prev-rank">${row.prevRank ?? '—'}</td>
      <td class="td-prev-gap">${fmt(gap23)}${unit}</td>
      <td class="td-change ${changeCls}">${changeTxt}</td>
    </tr>`;
  }).join('');

  // ── Legend ──
  document.getElementById('legend-bar').innerHTML = isQ41 ? `
    <div class="legend-item"><span class="dot" style="background:var(--green)"></span>Diff ≤ 10pp</div>
    <div class="legend-item"><span class="dot" style="background:var(--amber)"></span>10–20pp</div>
    <div class="legend-item"><span class="dot" style="background:var(--red)"></span>&gt; 20pp</div>
    <div class="legend-item" style="margin-left:1rem"><span style="color:var(--green)">▲</span>&nbsp;Rank improved</div>
    <div class="legend-item"><span style="color:var(--red)">▼</span>&nbsp;Rank declined</div>` : `
    <div class="legend-item"><span class="dot" style="background:var(--green)"></span>Gap ≤ 7%</div>
    <div class="legend-item"><span class="dot" style="background:var(--amber)"></span>7–12%</div>
    <div class="legend-item"><span class="dot" style="background:var(--red)"></span>&gt; 12%</div>
    <div class="legend-item" style="margin-left:1rem"><span style="color:var(--green)">▲</span>&nbsp;Rank improved</div>
    <div class="legend-item"><span style="color:var(--red)">▼</span>&nbsp;Rank declined</div>`;

  // ── Footnote ──
  document.getElementById('footnote-text').innerHTML = isQ41
    ? `<strong>Q4–Q1 women's representation difference</strong> is the percentage of women in the top pay quartile (Q4) minus the percentage of women in the bottom pay quartile (Q1). A higher value means women are more concentrated in lower-paid roles — a sign of occupational segregation by pay level. A lower (or negative) figure indicates greater equity across the pay distribution. Universities are ranked from lowest to highest.`
    : `<strong>How to read this table:</strong> The gender pay gap is the difference between ${metric==='avg'?'average':'median'} total remuneration of men and women, expressed as a percentage of men's remuneration. A positive gap means women earn less on average. Universities are ranked from lowest gap (most equitable) to highest. The <em>Rank Change</em> column shows movement between 2023–24 and 2024–25 — ▲ means a university improved its ranking. <strong>Note on median gaps:</strong> A median gap of 0% does not necessarily mean pay parity; it can reflect that the median salary band is shared while other bands diverge.`;

  // header sort highlight
  document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
  if (['rank-asc','rank-desc'].includes(sortKey)) document.getElementById('th-gap').classList.add('sorted');
}

// ─────────────────────────────────────────────
// Footer — static, uses 2024-25 data
// ─────────────────────────────────────────────
(function buildFooter() {
  const totalStaff24 = RAW.reduce((s,d) => s + d.staff24, 0);
  const totalStaff23 = RAW.reduce((s,d) => s + d.staff23, 0);
  const weightedPctW = RAW.reduce((s,d) => s + d.pctW24 * d.staff24, 0) / totalStaff24;

  document.getElementById('footer-inner').innerHTML = `
    <div class="footer-stat">
      <span class="footer-stat-label">Total staff covered (2024–25)</span>
      <span class="footer-stat-value">${totalStaff24.toLocaleString()}</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Total staff covered (2023–24)</span>
      <span class="footer-stat-value">${totalStaff23.toLocaleString()}</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Women as % of workforce (2024–25, staff-weighted)</span>
      <span class="footer-stat-value">${weightedPctW.toFixed(1)}%</span>
    </div>
    <div class="footer-stat">
      <span class="footer-stat-label">Universities reporting</span>
      <span class="footer-stat-value">39</span>
    </div>
    <p class="footer-note">Data from the WGEA Employer Census. The gender pay gap measures the difference in remuneration between men and women as a percentage of men's pay. Positive values indicate women earn less on average.</p>
  `;
})();

// ─────────────────────────────────────────────
// Event handlers
// ─────────────────────────────────────────────
function setMetric(m) { metric = m; render(); }
function setSort(s) { sortKey = s; document.getElementById('sort-select').value = s; render(); }

render();
</script>
</body>
</html>
